<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Kolkata</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Rajdhani:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
</head>

<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <ul>
            <li><a href="index.html"><i class="fas fa-home"></i><span class="sidebar-collapsed-text">Home</span></a>
            </li>
            <li><a href="notifications.html"><i class="fas fa-bell"></i><span class="sidebar-collapsed-text">Live
                        Notifications</span></a></li>
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span
                        class="sidebar-collapsed-text">Dashboard</span></a></li>
            <li><a href="map.html"><i class="fas fa-map-marked-alt"></i><span
                        class="sidebar-collapsed-text">Map</span></a></li>
            <li><a href="cameras.html"><i class="fas fa-video"></i><span
                        class="sidebar-collapsed-text">Cameras</span></a></li>
            <li><a href="contact.html"><i class="fas fa-address-book"></i><span
                        class="sidebar-collapsed-text">Contact</span></a></li>
            <li><a href="admin.html"><i class="fas fa-user-shield"></i><span
                        class="sidebar-collapsed-text">Admin</span></a></li>
            <li><a href="#" id="logout"><i class="fas fa-sign-out-alt"></i><span
                        class="sidebar-collapsed-text">Logout</span></a></li>
        </ul>
    </aside>

    <!-- System Status Bar -->
    <div class="system-status-bar">
        <div class="system-status-item">
            <span class="status-indicator status-normal"></span>
            <span>Last Sync: 2 min ago</span>
        </div>
        <div class="system-status-item">
            <span class="status-indicator status-normal"></span>
            <span>Server Load: 32%</span>
        </div>
        <div class="system-status-item">
            <span class="status-indicator status-normal"></span>
            <span>API: Operational</span>
        </div>
        <div class="system-status-item">
            <span>AI Model: v3.2.1</span>
        </div>
        <div class="system-status-item">
            <span>Active Tolls: 18/22</span>
        </div>
        <div class="system-status-item">
            <span>Camera Uptime: 98.7%</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <section class="contact">
            <h2><i class="fas fa-address-book"></i> Contact Us</h2>
            <form class="card">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-building"></i>
                    <input type="text" placeholder="Organization">
                </div>
                <div class="input-group">
                    <i class="fas fa-comment"></i>
                    <textarea placeholder="Message" required></textarea>
                </div>
                <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Send Message</button>
            </form>
        </section>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>
 
    <script>
        // Theme toggle functionality
        document.getElementById('themeToggle').addEventListener('click', function () {
            document.body.classList.toggle('light-mode');
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });
    </script>
</body>

</html>
